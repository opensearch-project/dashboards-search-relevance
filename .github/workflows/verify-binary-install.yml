name: 'Install Dashboards with Plugin via Binary'

on: [push, pull_request]
env:
  CI: 1
  # avoid warnings like "tput: No value for $TERM and no -T specified"
  TERM: xterm

jobs:
  verify-binary-installation:
    name: Run binary installation
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        # TODO: add windows support when OSD core is stable on windows
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set env
        run: |
          opensearch_version=$(node -p "require('./opensearch_dashboards.json').opensearchDashboardsVersion")
          plugin_version=$(node -p "require('./opensearch_dashboards.json').version")
          echo "OPENSEARCH_VERSION=$opensearch_version" >> $GITHUB_ENV
          echo "PLUGIN_VERSION=$plugin_version" >> $GITHUB_ENV
        shell: bash

      - name: Run Opensearch
        uses: opensearch-project/opensearch-build/.github/actions/start-opensearch@3d9a524bbfc8128d96113cc578b462153f2ea8d4
        with:
          opensearch-version: ${{ env.OPENSEARCH_VERSION }}
          security-enabled: false
          jdk-version: 21

      - name: Run Dashboard
        id: setup-dashboards
        uses: opensearch-project/opensearch-build/.github/actions/setup-opensearch-dashboards@3d9a524bbfc8128d96113cc578b462153f2ea8d4
        with:
          plugin_name: dashboards-search-relevance
          built_plugin_name: searchRelevanceDashboards
          built_plugin_suffix: ${{ env.OPENSEARCH_VERSION }}
          install_zip: true

      - name: Start the binary
        run: |
          nohup ./bin/opensearch-dashboards &
        working-directory: ${{ steps.setup-dashboards.outputs.dashboards-binary-directory }}
        shell: bash

      - name: Health check
        run: |
          timeout 300 bash -c 'while [[ "$(curl http://localhost:5601/api/status | jq -r '.status.overall.state')" != "green" ]]; do sleep 5; done'
        shell: bash
